<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>md-business viewer</title>
    <!-- data-pagedjs-ignore: Paged.js treats @media print rules as canonical
         and re-applies them on screen. Keeping the viewer chrome's CSS out of
         its parsing pass prevents the toolbar from being hidden post-paginate. -->
    <link rel="stylesheet" href="./viewer.css" data-pagedjs-ignore />
  </head>
  <body data-mode="preview">
    <header id="mdb-toolbar" class="mdb-toolbar">
      <div class="mdb-toolbar__title">md-business</div>
      <div class="mdb-toolbar__mode" role="tablist" aria-label="表示モード">
        <button id="mdb-mode-edit" class="mdb-toolbar__tab" type="button" role="tab" aria-selected="false" data-mode="edit">編集</button>
        <button id="mdb-mode-preview" class="mdb-toolbar__tab" type="button" role="tab" aria-selected="true" data-mode="preview">プレビュー</button>
      </div>
      <div class="mdb-toolbar__spacer"></div>
      <button id="mdb-print" class="mdb-toolbar__action" type="button">PDF をダウンロード</button>
      <button id="mdb-reload" class="mdb-toolbar__action mdb-toolbar__action--ghost" type="button">別ファイルを開く</button>
      <input id="mdb-file-picker" type="file" accept=".md,.markdown,text/markdown" hidden />
    </header>
    <main id="mdb-stage" class="mdb-stage">
      <div id="mdb-status" class="mdb-status">読み込み中…</div>
      <!-- Edit mode: split pane (editor + live preview iframe).
           Preview mode: only #mdb-document is visible (CSS toggles via [data-mode]). -->
      <div id="mdb-split" class="mdb-split">
        <section id="mdb-editor-pane" class="mdb-editor-pane">
          <header class="mdb-pane-head">
            <span class="mdb-pane-head__title">Markdown</span>
            <span id="mdb-editor-dirty" class="mdb-pane-head__hint" hidden>未保存</span>
          </header>
          <div id="mdb-editor" class="mdb-editor"></div>
        </section>
        <section id="mdb-preview-pane" class="mdb-preview-pane">
          <header class="mdb-pane-head">
            <span class="mdb-pane-head__title">プレビュー</span>
            <span id="mdb-preview-errors-badge" class="mdb-pane-head__badge" hidden>0 件の不備</span>
          </header>
          <!-- The preview iframe isolates the invoice CSS / Paged.js from the
               surrounding viewer chrome — without isolation, @page rules and
               Paged.js's body mutations would clobber the toolbar. -->
          <iframe id="mdb-preview" class="mdb-preview" title="プレビュー"></iframe>
        </section>
      </div>
    </main>
    <div id="mdb-pdf-guide" class="mdb-modal" hidden>
      <div class="mdb-modal__backdrop"></div>
      <div class="mdb-modal__panel" role="dialog" aria-labelledby="mdb-pdf-guide-title" aria-modal="true">
        <h2 id="mdb-pdf-guide-title" class="mdb-modal__title">PDF をダウンロード</h2>
        <p class="mdb-modal__body">
          Chrome の印刷ダイアログが開きます。<br />
          <strong>「送信先」を「PDF として保存」</strong> に切り替えて「保存」を押してください。
        </p>
        <div class="mdb-modal__hint">
          ※ Mac の場合は「PDF として保存」または「PDF に書き出す」と表示されます。
        </div>
        <label class="mdb-modal__remember">
          <input id="mdb-pdf-guide-skip" type="checkbox" />
          <span>次回から表示しない</span>
        </label>
        <div class="mdb-modal__actions">
          <button id="mdb-pdf-guide-cancel" class="mdb-toolbar__action mdb-toolbar__action--ghost" type="button">キャンセル</button>
          <button id="mdb-pdf-guide-go" class="mdb-toolbar__action" type="button">印刷ダイアログを開く</button>
        </div>
      </div>
    </div>
    <script type="module" src="./index.ts"></script>
  </body>
</html>
