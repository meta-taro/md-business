<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <base target="_top" />
    <title>md-business</title>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,400,0,0"
    />
    <style>
      body { font-family: 'Roboto', 'Noto Sans JP', sans-serif; margin: 0; padding: 16px; color: #202124; }
      h1 { font-size: 14px; margin: 0 0 8px 0; }
      h2 { font-size: 12px; color: #5f6368; margin: 16px 0 6px 0; text-transform: uppercase; letter-spacing: 0.4px; }
      p  { font-size: 12px; color: #5f6368; margin: 0 0 12px 0; }
      textarea { width: 100%; height: 200px; font-family: 'Roboto Mono', 'Source Code Pro', monospace;
        font-size: 12px; padding: 8px; border: 1px solid #dadce0; border-radius: 4px; box-sizing: border-box; }
      input[type=text], input[type=password] { box-sizing: border-box; padding: 6px 8px;
        border: 1px solid #dadce0; border-radius: 4px; font-size: 12px; font-family: 'Roboto Mono', monospace; }
      .actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
      button { padding: 8px 14px; background: #1a73e8; color: white; border: 0;
        border-radius: 4px; font-size: 13px; cursor: pointer; }
      button.secondary { background: #fff; color: #1a73e8; border: 1px solid #1a73e8; }
      button:disabled { background: #80868b; cursor: progress; }
      button.secondary:disabled { background: #f1f3f4; color: #80868b; border-color: #dadce0; }
      .palette { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
      .palette button.icon { padding: 6px; min-width: 32px; height: 32px; display: inline-flex;
        align-items: center; justify-content: center; }
      .palette button.icon .material-symbols-outlined { font-size: 20px; }
      .col-name-row { display: flex; gap: 6px; margin-top: 6px; }
      .col-name-row input { flex: 1; }
      .status {
        margin-top: 12px;
        font-size: 12px;
        color: #137333;
        white-space: pre-line;
        padding: 8px 10px;
        border-radius: 6px;
        background: #e6f4ea;
        border: 1px solid #ceead6;
      }
      .status.err { color: #c5221f; background: #fce8e6; border-color: #f4c7c3; }
      .status:empty { display: none; }
      hr { border: 0; border-top: 1px solid #dadce0; margin: 16px 0; }
    </style>
  </head>
  <body>
    <h1>md-business — 検証シート frontmatter</h1>
    <p>
      列名を入れてアイコンを押すと <code>columns</code> に追加されます。
      テンプレから始めるか、下の textarea を直接編集してから「セットアップ」で適用してください。
    </p>

    <h2>テンプレ / ローカル md</h2>
    <div class="palette" id="tpl-palette">
      <button class="icon secondary" data-tpl="minimal" title="最小テンプレ"><span class="material-symbols-outlined">description</span></button>
      <button class="icon secondary" data-tpl="full" title="完全テンプレ"><span class="material-symbols-outlined">checklist</span></button>
      <button class="icon secondary" data-tpl="clear" title="クリア"><span class="material-symbols-outlined">delete_sweep</span></button>
      <button class="icon secondary" id="md-upload-btn" title="ローカル md を開く"><span class="material-symbols-outlined">upload_file</span></button>
      <input type="file" id="md-upload-input" accept=".md,.markdown,text/markdown" hidden />
    </div>

    <h2>列を追加</h2>
    <div class="col-name-row">
      <input type="text" id="col-name" placeholder="列名（空なら「列N」）" />
    </div>
    <div class="palette" id="col-palette">
      <button class="icon secondary" data-type="text" title="text（自由記述）"><span class="material-symbols-outlined">text_fields</span></button>
      <button class="icon secondary" data-type="multiline_text" title="multiline_text（複数行）"><span class="material-symbols-outlined">notes</span></button>
      <button class="icon secondary" data-type="enum" title="enum（候補から選択）"><span class="material-symbols-outlined">arrow_drop_down_circle</span></button>
      <button class="icon secondary" data-type="date" title="date（日付）"><span class="material-symbols-outlined">calendar_month</span></button>
      <button class="icon secondary" data-type="number" title="number（数値）"><span class="material-symbols-outlined">tag</span></button>
      <button class="icon secondary" data-type="checkbox" title="checkbox（チェック）"><span class="material-symbols-outlined">check_box</span></button>
      <button class="icon secondary" data-type="url" title="url（リンク）"><span class="material-symbols-outlined">link</span></button>
      <button class="icon secondary" id="col-pop-btn" title="末尾の列を削除"><span class="material-symbols-outlined">delete</span></button>
    </div>

    <h2>frontmatter / 本文</h2>
    <textarea id="src" placeholder="（テンプレを選ぶか、アイコンで列を追加してください）"></textarea>
    <div class="actions">
      <button id="import-btn" class="secondary">md → シート</button>
      <button id="export-btn" class="secondary">シート → md</button>
    </div>
    <div class="actions">
      <button id="setup-btn">検証シート: セットアップ</button>
      <button id="validate-btn" class="secondary">検証</button>
      <button id="ts-export-btn" class="secondary">md 書き出し</button>
    </div>
    <div id="status" class="status" role="status" aria-live="polite"></div>

    <hr />
    <h1>GitHub 自動同期</h1>
    <p>
      frontmatter に <code>repository: owner/repo@branch:path</code> を書いて「有効化」を押すと、
      シート編集が <strong>2 秒</strong> 静まった時点で GitHub に PUT します。
      <strong>PAT は PdM が手作業で登録</strong>してください。
    </p>
    <div class="actions">
      <input id="pat-input" type="password" placeholder="ghp_..." style="flex: 1;" />
      <button id="pat-save-btn" class="secondary">PAT を保存</button>
      <button id="pat-clear-btn" class="secondary">PAT 削除</button>
    </div>
    <div class="actions">
      <button id="sync-install-btn">有効化</button>
      <button id="sync-uninstall-btn" class="secondary">無効化</button>
      <button id="sync-status-btn" class="secondary">状態</button>
    </div>

    <script>
      const $ = (id) => document.getElementById(id);
      const importBtn = $('import-btn');
      const exportBtn = $('export-btn');
      const setupBtn = $('setup-btn');
      const validateBtn = $('validate-btn');
      const tsExportBtn = $('ts-export-btn');
      const patInput = $('pat-input');
      const patSaveBtn = $('pat-save-btn');
      const patClearBtn = $('pat-clear-btn');
      const syncInstallBtn = $('sync-install-btn');
      const syncUninstallBtn = $('sync-uninstall-btn');
      const syncStatusBtn = $('sync-status-btn');
      const colNameInput = $('col-name');
      const colPopBtn = $('col-pop-btn');
      const mdUploadBtn = $('md-upload-btn');
      const mdUploadInput = $('md-upload-input');
      const src = $('src');
      const status = $('status');

      const allBtns = Array.from(document.querySelectorAll('button'));

      function setBusy(busy, message) {
        allBtns.forEach((b) => (b.disabled = busy));
        status.classList.remove('err');
        status.textContent = message || '';
        if (message) scrollStatusIntoView();
      }
      function setError(message) {
        allBtns.forEach((b) => (b.disabled = false));
        status.classList.add('err');
        status.textContent = message || '不明なエラー';
        scrollStatusIntoView();
      }
      function scrollStatusIntoView() {
        try {
          status.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
        } catch (_e) {
          status.scrollIntoView();
        }
      }
      function failureHandler() {
        return (err) => setError(err && err.message ? err.message : String(err));
      }

      function autoColumnName() {
        const raw = colNameInput.value.trim();
        if (raw.length > 0) return raw;
        const match = (src.value.match(/name:/g) || []).length;
        return '列' + (match + 1);
      }

      // テンプレ
      document.querySelectorAll('#tpl-palette button[data-tpl]').forEach((btn) => {
        btn.addEventListener('click', () => {
          const tplKey = btn.getAttribute('data-tpl');
          setBusy(true, 'テンプレを適用中...');
          google.script.run
            .withSuccessHandler((res) => {
              if (res && res.ok) {
                src.value = res.newSrc;
                setBusy(false, 'テンプレ「' + tplKey + '」を適用しました。');
              } else {
                setError(res && res.error);
              }
            })
            .withFailureHandler(failureHandler())
            .applyTestSpecTemplateAction(tplKey);
        });
      });

      // 列追加
      document.querySelectorAll('#col-palette button[data-type]').forEach((btn) => {
        btn.addEventListener('click', () => {
          const colType = btn.getAttribute('data-type');
          const colName = autoColumnName();
          let values = null;
          if (colType === 'enum') {
            const raw = window.prompt('enum の候補値を CSV で入力（例: OK,NG,保留）', 'OK,NG');
            if (raw === null) return;
            values = raw.split(',').map((s) => s.trim()).filter((s) => s.length > 0);
            if (values.length === 0) {
              setError('enum には値が 1 つ以上必要です。');
              return;
            }
          }
          setBusy(true, '「' + colName + '」(' + colType + ') を追加中...');
          google.script.run
            .withSuccessHandler((res) => {
              if (res && res.ok) {
                src.value = res.newSrc;
                colNameInput.value = '';
                setBusy(false, '「' + colName + '」(' + colType + ') を追加しました。');
              } else {
                setError(res && res.error);
              }
            })
            .withFailureHandler(failureHandler())
            .appendTestSpecColumn(src.value, colName, colType, values);
        });
      });

      // ローカル md アップロード
      mdUploadBtn.addEventListener('click', () => {
        mdUploadInput.value = '';
        mdUploadInput.click();
      });
      mdUploadInput.addEventListener('change', () => {
        const file = mdUploadInput.files && mdUploadInput.files[0];
        if (!file) return;
        const fileName = file.name;
        setBusy(true, '「' + fileName + '」を読み込み中...');
        const reader = new FileReader();
        reader.onerror = () => setError('ファイル読み込み失敗: ' + (reader.error && reader.error.message));
        reader.onload = () => {
          const content = typeof reader.result === 'string' ? reader.result : '';
          google.script.run
            .withSuccessHandler((res) => {
              if (res && res.ok) {
                src.value = res.src;
                setBusy(false, '「' + fileName + '」を読み込みました（' + res.src.length + ' chars）。');
              } else {
                setError(res && res.error);
              }
            })
            .withFailureHandler(failureHandler())
            .validateUploadedMarkdownAction(content, fileName);
        };
        reader.readAsText(file, 'utf-8');
      });

      // 末尾列削除
      colPopBtn.addEventListener('click', () => {
        setBusy(true, '末尾の列を削除中...');
        google.script.run
          .withSuccessHandler((res) => {
            if (res && res.ok) {
              src.value = res.newSrc;
              setBusy(false, '末尾の列を削除しました。');
            } else {
              setError(res && res.error);
            }
          })
          .withFailureHandler(failureHandler())
          .removeLastTestSpecColumn(src.value);
      });

      importBtn.addEventListener('click', () => {
        setBusy(true, 'インポート処理中...');
        google.script.run
          .withSuccessHandler((res) => {
            if (res && res.ok) {
              setBusy(false, res.rows + ' 行をインポートしました。');
            } else {
              setError(res && res.error);
            }
          })
          .withFailureHandler(failureHandler())
          .importMarkdownTableToActiveSheet(src.value);
      });

      exportBtn.addEventListener('click', () => {
        setBusy(true, 'エクスポート処理中...');
        google.script.run
          .withSuccessHandler((res) => {
            if (res && res.ok) {
              src.value = res.markdown;
              setBusy(false, res.rows + ' 行を Markdown に書き出しました。');
            } else {
              setError(res && res.error);
            }
          })
          .withFailureHandler(failureHandler())
          .exportActiveSheetToMarkdown();
      });

      setupBtn.addEventListener('click', () => {
        setBusy(true, '検証シートをセットアップ中...');
        google.script.run
          .withSuccessHandler((res) => {
            if (res && res.ok) {
              setBusy(false,
                res.columns + ' 列 / DataValidation ' + res.dataValidations +
                ' 件 / ConditionalFormat ' + res.conditionalFormats + ' 件 を適用しました。');
            } else {
              setError(res && res.error);
            }
          })
          .withFailureHandler(failureHandler())
          .setupTestSpecSheet(src.value);
      });

      validateBtn.addEventListener('click', () => {
        setBusy(true, '検証実行中...');
        google.script.run
          .withSuccessHandler((res) => {
            if (res && res.ok) {
              if (res.issues.length === 0) {
                setBusy(false, '問題なし — すべてのセルが frontmatter columns に適合しています。');
              } else {
                setError(res.issues.length +
                  ' 件の問題を検出しました（該当セルに setNote で詳細を記載）。');
              }
            } else {
              setError(res && res.error);
            }
          })
          .withFailureHandler(failureHandler())
          .validateActiveTestSpecSheet(src.value);
      });

      tsExportBtn.addEventListener('click', () => {
        setBusy(true, 'Markdown 書き出し中...');
        google.script.run
          .withSuccessHandler((res) => {
            if (res && res.ok) {
              src.value = res.markdown;
              setBusy(false, '検証シート frontmatter + body を書き出しました。');
            } else {
              setError(res && res.error);
            }
          })
          .withFailureHandler(failureHandler())
          .exportTestSpecMarkdown(src.value);
      });

      patSaveBtn.addEventListener('click', () => {
        const pat = patInput.value;
        setBusy(true, 'PAT を保存中...');
        google.script.run
          .withSuccessHandler((res) => {
            if (res && res.ok) {
              patInput.value = '';
              setBusy(false, 'PAT を保存しました（UserProperties）。');
            } else {
              setError(res && res.error);
            }
          })
          .withFailureHandler(failureHandler())
          .setGithubPat(pat);
      });

      patClearBtn.addEventListener('click', () => {
        setBusy(true, 'PAT を削除中...');
        google.script.run
          .withSuccessHandler(() => setBusy(false, 'PAT を削除しました。'))
          .withFailureHandler(failureHandler())
          .clearGithubPat();
      });

      syncInstallBtn.addEventListener('click', () => {
        setBusy(true, '自動同期を有効化中...');
        google.script.run
          .withSuccessHandler((res) => {
            if (res && res.ok) {
              setBusy(false, '自動同期 ON。シート「' + res.sheetName + '」→ ' + res.repoRef + ' に 2 秒 debounce で commit します。');
            } else {
              setError(res && res.error);
            }
          })
          .withFailureHandler(failureHandler())
          .installTestSpecAutoSync(src.value);
      });

      syncUninstallBtn.addEventListener('click', () => {
        setBusy(true, '自動同期を無効化中...');
        google.script.run
          .withSuccessHandler(() => setBusy(false, '自動同期 OFF。trigger を削除しました。'))
          .withFailureHandler(failureHandler())
          .uninstallTestSpecAutoSync();
      });

      syncStatusBtn.addEventListener('click', () => {
        setBusy(true, '状態を取得中...');
        google.script.run
          .withSuccessHandler((res) => {
            const parts = [
              '有効: ' + (res.installed ? 'YES' : 'NO'),
              'PAT: ' + (res.hasPat ? 'YES' : 'NO'),
              'sheet: ' + (res.sheetName || '-'),
              'repo: ' + (res.repoRef || '-'),
              'state: ' + res.state.kind,
            ];
            if (res.state.kind === 'success') {
              parts.push('@ ' + res.state.syncedAt + ' / sha ' + res.state.commitSha.slice(0, 7));
            }
            if (res.state.kind === 'error') {
              parts.push('@ ' + res.state.failedAt + ' / ' + res.state.reason + ': ' + (res.state.details || ''));
            }
            setBusy(false, parts.join(' | '));
          })
          .withFailureHandler(failureHandler())
          .getTestSpecAutoSyncStatus();
      });
    </script>
  </body>
</html>
