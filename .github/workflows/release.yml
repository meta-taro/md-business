name: Release build

# Windows(MSI/NSIS)・macOS(DMG) のインストーラを各ネイティブランナーで生成する。
# CLAUDE.md 方針「GitHub Releases タグなし / PR ベース」に合わせ、タグは打たず
# 手動トリガー(workflow_dispatch)のみで実行し、成果物は Release ではなく
# workflow artifact として上げる(Actions 画面から DL)。
# コード署名は未対応(§15: 証明書・鍵は人間が管理。未署名 DMG/MSI は初回配布時に警告が出る)。

on:
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  bundle:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: windows
            args: ""
          - os: macos-latest
            label: macos-universal
            # Intel/Apple Silicon 両対応の universal DMG。両アーキ target を toolchain で追加する。
            args: "--target universal-apple-darwin"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 9.12.0

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.os == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # desktop は @md-business/* 9 パッケージの dist を import するため、
      # tauri build 前にワークスペースをビルドする(ci.yml と同じ turbo build)。
      - name: Build workspace packages
        run: pnpm build

      - name: Build Tauri installers
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          tauriScript: pnpm tauri
          args: ${{ matrix.args }}

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: md-business-${{ matrix.label }}
          path: |
            apps/desktop/src-tauri/target/**/release/bundle/msi/*.msi
            apps/desktop/src-tauri/target/**/release/bundle/nsis/*.exe
            apps/desktop/src-tauri/target/**/release/bundle/dmg/*.dmg
          if-no-files-found: error
