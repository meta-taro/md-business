name: Release build

# タグ push（v* 例: v0.1.0）を起点に Windows(MSI/NSIS)・macOS(universal DMG) の
# インストーラを各ネイティブランナーで生成し、GitHub Release へ発行する。
# あわせて自動アップデート用の署名付き成果物と latest.json を生成・添付する
# （アプリの「更新を確認」はこの latest.json を参照する）。
#
# 署名鍵（TAURI_SIGNING_PRIVATE_KEY / 同 PASSWORD）は Repository secrets から注入する。
# 秘密鍵そのものはリポジトリに含めず、投入・更新は人手で行う。公開鍵はアプリ設定へ
# 文字列で焼き込んである。
#
# Release は下書き（draft）として作成する。内容を確認してから手動で publish することで
# 配布開始のタイミングを制御する。publish されて初めて latest.json が配信され、
# 既存アプリの自動更新が有効になる。
#
# コード署名（Windows Authenticode / Apple 公証）は未対応のため、初回インストール時に
# 発行元不明の警告が出る（インストール自体は可能）。公証対応は証明書の用意後に追加する。

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  bundle:
    # Release の作成・成果物アップロードに書き込み権限が要る。
    # デフォルトの GITHUB_TOKEN は read-only のため明示的に付与する。
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: windows
            args: ""
          - os: macos-latest
            label: macos-universal
            # Intel/Apple Silicon 両対応の universal DMG。両アーキ target を toolchain で追加する。
            args: "--target universal-apple-darwin"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 9.12.0

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.os == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # desktop は @md-business/* 9 パッケージの dist を import するため、
      # tauri build 前にワークスペースをビルドする（ci.yml と同じ turbo build）。
      - name: Build workspace packages
        run: pnpm build

      - name: Build and publish Tauri installers
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 自動アップデート成果物の署名鍵。未設定だとビルドが失敗する
          # （tauri.conf.json の createUpdaterArtifacts が有効なため）。
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/desktop
          tauriScript: pnpm tauri
          args: ${{ matrix.args }}
          # push されたタグ名でリリースを作る（例: v0.1.0）。
          tagName: ${{ github.ref_name }}
          releaseName: "md-business ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
