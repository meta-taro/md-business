name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 9.12.0

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install dependencies
        run: |
          pnpm install --frozen-lockfile 2>&1 | tee install.log
          exit ${PIPESTATUS[0]}

      - name: Verify baseline 1 (install script policy)
        # onlyBuiltDependencies: [] が pnpm-workspace.yaml で効いていることを継続検証する。
        # 依存パッケージの postinstall が走ると baseline 1（サプライチェーン防御）違反。
        run: |
          if grep -qE "(Thank you for using core-js|^[^[:space:]]+@[^[:space:]]+ postinstall\$|Running .* postinstall)" install.log; then
            echo "::error::Install script executed during pnpm install - baseline 1 (onlyBuiltDependencies) violated"
            grep -nE "(Thank you for using core-js|postinstall)" install.log || true
            exit 1
          fi
          echo "OK: no transitive postinstall scripts ran during install"

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test:run

      - name: Build
        run: pnpm build
